services:
  - type: web
    name: unforgiven-love
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm build
    startCommand: NODE_ENV=production node scripts/start-with-cron.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTO_GEN_ENABLED
        value: "true"
      - key: AMAZON_TAG
        value: spankyspinola-20
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: OPENAI_MODEL
        value: deepseek-v4-pro
      - key: GH_PAT
        sync: false
